<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>General Delivery Sheet</title>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    :root{
      --bg:#f4f2ed;--surface:#fff;--surface2:#f0ede7;
      --border:#e0dbd0;--border2:#c8c2b4;
      --text:#1a1714;--text2:#6b6459;--text3:#9e968a;
      --accent:#c8841a;--accent-bg:#fdf3e3;--accent-bd:#f0c87a;
      --green:#2e7d4f;--green-bg:#eaf4ee;--green-bd:#a8d9b8;
      --red:#b83232;--red-bg:#fdf0f0;--red-bd:#f0b8b8;
      --blue:#1a5fa8;--blue-bg:#eef4fc;--blue-bd:#b0cef0;
      --gray:#5f5e5a;--gray-bg:#f1efe8;--gray-bd:#d3d1c7;
      --r:10px;--r2:6px;--sh:0 1px 3px rgba(0,0,0,.07)
    }
    body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
    .nav{position:sticky;top:0;z-index:50;background:var(--surface);border-bottom:1px solid var(--border);padding:11px 18px;display:flex;align-items:center;gap:10px}
    .nav-back{display:none;align-items:center;justify-content:center;width:34px;height:34px;cursor:pointer;border-radius:var(--r2);border:1px solid var(--border2);color:var(--text);background:transparent;font-size:20px;flex-shrink:0}
    .nav-back.show{display:flex}
    .nav-info{flex:1;min-width:0}
    .nav-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .nav-sub{font-size:11px;color:var(--text3);margin-top:1px}
    .nav-btn{flex-shrink:0;cursor:pointer;border:1px solid var(--accent-bd);border-radius:var(--r2);padding:7px 13px;background:var(--accent);color:#fff;font-size:12px;font-weight:600}
    .nav-btn.ghost{background:transparent;color:var(--text2);border-color:var(--border2)}
    .page{max-width:640px;margin:0 auto;padding:18px 18px 80px}
    .card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--sh)}
    .card-title{font-size:14px;font-weight:600;margin-bottom:14px}
    .badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:999px;font-size:11px;font-weight:600;border:1px solid}
    .b-delivered{background:var(--green-bg);color:var(--green);border-color:var(--green-bd)}
    .b-pending{background:var(--accent-bg);color:var(--accent);border-color:var(--accent-bd)}
    .b-cancelled{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
    .b-gray{background:var(--gray-bg);color:var(--gray);border-color:var(--gray-bd)}
    .b-blue{background:var(--blue-bg);color:var(--blue);border-color:var(--blue-bd)}
    .tag{display:inline-block;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.04em}
    .t-delivery{background:var(--blue-bg);color:var(--blue)}
    .t-pickup{background:var(--green-bg);color:var(--green)}
    .t-rentals{background:var(--accent-bg);color:var(--accent)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:14px}
    .stats-2{grid-template-columns:repeat(2,1fr)}
    .stat{background:var(--surface2);border-radius:var(--r2);padding:11px 13px}
    .sl{font-size:11px;color:var(--text3);margin-bottom:3px}
    .sv{font-size:19px;font-weight:700;color:var(--text)}
    .sv.green{color:var(--green)}.sv.red{color:var(--red)}.sv.accent{color:var(--accent)}
    .home-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:18px}
    .hstat{background:var(--surface);border:1px solid var(--border);border-radius:var(--r2);padding:12px 10px;text-align:center;box-shadow:var(--sh)}
    .hstat-val{font-size:22px;font-weight:700;color:var(--accent)}
    .hstat-lbl{font-size:10px;color:var(--text3);margin-top:2px}
    .filters{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:2px;scrollbar-width:none}
    .filters::-webkit-scrollbar{display:none}
    .chip{flex-shrink:0;padding:5px 12px;border-radius:999px;border:1px solid var(--border2);font-size:12px;font-weight:500;cursor:pointer;background:transparent;color:var(--text2)}
    .chip.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .month-bar{display:flex;gap:6px;overflow-x:auto;padding-bottom:2px;margin-bottom:16px;scrollbar-width:none}
    .month-bar::-webkit-scrollbar{display:none}
    .mchip{flex-shrink:0;padding:5px 13px;border-radius:999px;border:1px solid var(--border2);font-size:12px;font-weight:600;cursor:pointer;background:transparent;color:var(--text2)}
    .mchip.active{background:var(--text);color:#fff;border-color:var(--text)}
    .progress{height:5px;background:var(--surface2);border-radius:3px;overflow:hidden;margin-bottom:14px}
    .progress-fill{height:100%;background:var(--accent);border-radius:3px}
    .sheet-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:13px 16px;margin-bottom:8px;cursor:pointer;box-shadow:var(--sh);display:flex;align-items:center;justify-content:space-between}
    .sc-name{font-size:14px;font-weight:600}
    .sc-sub{font-size:11px;color:var(--text3);margin-top:2px}
    .sc-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
    .di{border:1px solid var(--border);border-radius:var(--r);padding:13px 15px;margin-bottom:8px;background:var(--surface);cursor:pointer;box-shadow:var(--sh)}
    .di.expanded{border-color:var(--accent-bd)}
    .di-row{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
    .di-name{font-size:14px;font-weight:600;margin-bottom:3px}
    .di-meta{font-size:12px;color:var(--text2)}
    .di-notes{font-size:12px;color:var(--text3);font-style:italic;margin-top:3px}
    .di-right{text-align:right;flex-shrink:0}
    .di-amount{font-size:13px;font-weight:700;margin-top:6px}
    .di-actions{margin-top:10px;padding-top:10px;border-top:1px solid var(--border)}
    .di-actions-lbl{font-size:11px;color:var(--text3);margin-bottom:7px;font-weight:500}
    .status-grid{display:flex;flex-wrap:wrap;gap:5px}
    .sq-btn{padding:4px 10px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border2);background:transparent;color:var(--text2)}
    .fg{margin-bottom:13px}
    .fl{display:block;font-size:11px;font-weight:700;color:var(--text2);margin-bottom:5px;text-transform:uppercase;letter-spacing:.03em}
    .fc{width:100%;padding:9px 12px;border:1px solid var(--border2);border-radius:var(--r2);font-size:13px;font-family:inherit;background:var(--surface);color:var(--text)}
    .fc:focus{outline:none;border-color:var(--accent)}
    .fr{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:9px 16px;border-radius:var(--r2);border:1px solid var(--border2);font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--text);font-family:inherit}
    .btn:hover{background:var(--surface2)}
    .btn-p{background:var(--accent);color:#fff;border-color:var(--accent)}
    .btn-d{background:var(--red-bg);color:var(--red);border-color:var(--red-bd)}
    .btn-full{width:100%}
    .btn-sm{padding:5px 11px;font-size:12px}
    .dr{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);font-size:13px}
    .dr:last-child{border-bottom:none}
    .dn{color:var(--text2)}.dv{font-weight:700}
    .confirm-box{background:var(--red-bg);border:1px solid var(--red-bd);border-radius:var(--r2);padding:11px 13px;margin-top:8px}
    .confirm-text{font-size:13px;color:var(--red);margin-bottom:9px;font-weight:500}
    .sec-lbl{font-size:10px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin:18px 0 8px;padding:0 2px}
    .sec-lbl:first-child{margin-top:0}
    .search-wrap{position:relative;margin-bottom:13px}
    .search-icon{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:13px;pointer-events:none}
    .search-ic{padding-left:34px!important}
    /* LOADER */
    #loader{position:fixed;inset:0;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999}
    .spinner{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;margin-bottom:16px}
    @keyframes spin{to{transform:rotate(360deg)}}
    .loader-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:6px}
    .loader-sub{font-size:13px;color:var(--text2);margin-bottom:16px}
    .pbar{width:220px;height:6px;background:var(--border);border-radius:3px;overflow:hidden}
    .pfill{height:100%;background:var(--accent);border-radius:3px;transition:width .2s}

    .home-filter-bar{display:flex;gap:8px;margin-bottom:13px;align-items:center}
    .home-filter-bar .search-wrap{flex:1;margin-bottom:0}
    .date-wrap{position:relative;flex-shrink:0}
    .date-wrap input[type="date"]{padding:9px 28px 9px 32px;border:1px solid var(--border2);border-radius:var(--r2);font-size:12px;font-family:inherit;background:var(--surface);color:var(--text);cursor:pointer;width:148px}
    .date-wrap input[type="date"]:focus{outline:none;border-color:var(--accent)}
    .date-wrap input.on{border-color:var(--accent);background:var(--accent-bg)}
    .date-ico{position:absolute;left:9px;top:50%;transform:translateY(-50%);font-size:12px;pointer-events:none}
    .date-x{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:var(--text3);font-size:12px;padding:0;display:none}
    .date-wrap input.on~.date-x{display:block}

    .empty{text-align:center;padding:50px 20px;color:var(--text2)}
    .empty-icon{font-size:40px;margin-bottom:10px}
    .flex{display:flex}.ai{align-items:center}.jb{justify-content:space-between}.gap-8{gap:8px}.f1{flex:1}.mt-10{margin-top:10px}.mt-14{margin-top:14px}.text2{color:var(--text2)}.text3{color:var(--text3)}
    .load-more{text-align:center;margin-top:6px}
  </style>
</head>
<body>

<!-- Full-screen loader shown during seed import -->
<div id="loader">
  <div class="spinner"></div>
  <div class="loader-title">General Delivery Sheet</div>
  <div class="loader-sub" id="loader-msg">Iniciando...</div>
  <div class="pbar"><div class="pfill" id="loader-bar" style="width:0%"></div></div>
</div>

<div id="app" style="display:none"></div>

<script>
// ═══════════ CONSTANTS ═══════════
const SEED_VERSION = 'v5_mar_abr';
const DATA_FILE    = 'delivery_data.json'; // must be in same folder
const DRIVERS   = ['MR. NURSE','MR. GRANT','MARK THOMAS','MARK','JERREL','MR. MAYERS','OTRO'];
const TYPES     = ['DELIVERY','PICKUP','RENTALS'];
const BUSINESSES= ['CARIBZOOM','DGA','PPS','DC','BZ','HE','ZP','PH','HJ','OD','NATIVE','COLLAGE','ROSE','KAY','THURSTON','MARYAM','SHANIAH','GLAMOUR','FIONA','CHRISTINE','DAC','BLISS','XFINITY','LUMIERE','CHATRAM','PINK RIBBON','PINK HEAVEN','ARTYSCRAFT','LIVITY','592 EVENTS','SUSANA','PSS','DIY','LUMIERE SPEC'];
const EXP_T     = ['GAS','BOTELLAS','COMIDA','POLVO','SILLAS','BUSES','PASAJE','REPUESTO','OTRO'];
const STATUSES  = [
  {k:'PENDING',    l:'Pendiente',   c:'b-pending'},
  {k:'DELIVERED',  l:'Entregado',   c:'b-delivered'},
  {k:'CANCELLED',  l:'Cancelado',   c:'b-cancelled'},
  {k:'NO_ANSWER',  l:'Sin resp.',   c:'b-gray'},
  {k:'RETURNED',   l:'Devuelto',    c:'b-gray'},
  {k:'MARK',       l:'→ Mark',      c:'b-blue'},
  {k:'GRANT',      l:'→ Grant',     c:'b-blue'},
  {k:'NURSE',      l:'→ Nurse',     c:'b-blue'},
  {k:'TRANSFERRED',l:'Transferido', c:'b-blue'},
];
const TRANS_KEYS = new Set(['MARK','GRANT','NURSE','TRANSFERRED','RETURNED']);
const PAGE_SIZE  = 30;
const MONTHS     = ['2026-01','2026-02','2026-03','2026-04'];

// ═══════════ STATE ═══════════
const S = {
  view:'home', currentId:null,
  sheets:[], dels:[], exps:[],
  showNewSheet:false, showForm:false, showSummary:false,
  showNewExp:false, expandedId:null, confirmId:null, editId:null,
  filterStatus:'all', search:'', month:'', homeSearch:'', homeDate:'', homeOffset:0,
};

// ═══════════ STORAGE ═══════════
const LS = {
  get(k)   { try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null} },
  set(k,v) { try{localStorage.setItem(k,JSON.stringify(v))}catch(e){console.warn('LS full',e)} },
  del(k)   { try{localStorage.removeItem(k)}catch{} },
};

// ═══════════ SEED (async fetch, chunked write) ═══════════
function setLoader(msg, pct) {
  const m = document.getElementById('loader-msg');
  const b = document.getElementById('loader-bar');
  if (m) m.textContent = msg;
  if (b) b.style.width = pct + '%';
}

function hideLoader() {
  const l = document.getElementById('loader');
  const a = document.getElementById('app');
  if (l) l.style.display = 'none';
  if (a) a.style.display = '';
}

function seedIfNeeded() {
  return new Promise((resolve) => {
    // Already seeded — skip entirely, no work needed
    if (LS.get('gds_version') === SEED_VERSION) { resolve(); return; }

    setLoader('Iniciando importación...', 5);

    // Create Web Worker via Blob URL — runs completely OFF the main thread
    // JSON.parse of 712KB happens in the worker, browser NEVER freezes
    const workerCode = "\nself.onmessage = async function(e) {\n  const { url, version } = e.data;\n  \n  // 1. Fetch JSON\n  self.postMessage({ type:'progress', pct:10, msg:'Descargando datos...' });\n  let data;\n  try {\n    const res = await fetch(url);\n    if (!res.ok) throw new Error('No se pudo cargar ' + url);\n    self.postMessage({ type:'progress', pct:35, msg:'Procesando datos...' });\n    // JSON.parse happens here - OFF main thread, browser won't freeze\n    data = await res.json();\n  } catch(err) {\n    self.postMessage({ type:'error', msg: err.message });\n    return;\n  }\n\n  self.postMessage({ type:'progress', pct:50, msg:'Preparando hojas...' });\n\n  // 2. Send sheets index (small, one shot)\n  self.postMessage({ type:'sheets', sheets: data.sheets });\n\n  // 3. Send deliveries in chunks of 20\n  const ids = Object.keys(data.deliveries);\n  const CHUNK = 20;\n  for (let i = 0; i < ids.length; i += CHUNK) {\n    const chunk = {};\n    ids.slice(i, i + CHUNK).forEach(id => {\n      if (data.deliveries[id]?.length > 0) chunk[id] = data.deliveries[id];\n    });\n    const pct = 50 + Math.round((i / ids.length) * 48);\n    self.postMessage({ type:'chunk', chunk, pct, i, total: ids.length });\n    // Yield so browser doesn't consider worker hung\n    await new Promise(r => setTimeout(r, 0));\n  }\n\n  self.postMessage({ type:'done', version });\n};\n";
    const blob   = new Blob([workerCode], { type: 'application/javascript' });
    const blobURL = URL.createObjectURL(blob);
    const worker = new Worker(blobURL);

    worker.onmessage = (e) => {
      const { type } = e.data;

      if (type === 'progress') {
        setLoader(e.data.msg, e.data.pct);

      } else if (type === 'sheets') {
        // Clear old gds_ keys before writing fresh data
        for (const k of Object.keys(localStorage)) {
          if (k.startsWith('gds_')) localStorage.removeItem(k);
        }
        LS.set('gds_sheets', e.data.sheets);

      } else if (type === 'chunk') {
        // Write this chunk to localStorage (small, fast)
        for (const [id, dels] of Object.entries(e.data.chunk)) {
          LS.set('gds_d_' + id, dels);
        }
        setLoader(`Importando... ${e.data.i}/${e.data.total} hojas`, e.data.pct);

      } else if (type === 'done') {
        LS.set('gds_version', e.data.version);
        worker.terminate();
        URL.revokeObjectURL(blobURL);
        setLoader('¡Listo!', 100);
        setTimeout(resolve, 300);

      } else if (type === 'error') {
        setLoader('Error: ' + e.data.msg, 0);
        worker.terminate();
        URL.revokeObjectURL(blobURL);
        setTimeout(resolve, 4000);
      }
    };

    worker.onerror = (err) => {
      // Worker not supported — fall back to main thread fetch
      setLoader('Cargando datos...', 10);
      fetch(DATA_FILE)
        .then(r => r.json())
        .then(data => {
          for (const k of Object.keys(localStorage)) {
            if (k.startsWith('gds_')) localStorage.removeItem(k);
          }
          LS.set('gds_sheets', data.sheets);
          for (const [id, dels] of Object.entries(data.deliveries)) {
            if (dels?.length > 0) LS.set('gds_d_' + id, dels);
          }
          LS.set('gds_version', SEED_VERSION);
          setLoader('¡Listo!', 100);
          setTimeout(resolve, 300);
        })
        .catch(err2 => {
          setLoader('Error cargando datos: ' + err2.message, 0);
          setTimeout(resolve, 4000);
        });
    };

    // Start the worker
    worker.postMessage({ url: DATA_FILE, version: SEED_VERSION });
  });
}

// ═══════════ HELPERS ═══════════
const uid     = () => Date.now().toString(36)+Math.random().toString(36).slice(2,5);
const today   = () => new Date().toISOString().split('T')[0];
const fmt     = n  => 'G$'+(n||0).toLocaleString('en');
const scls    = s  => s==='DELIVERED'?'b-delivered':s==='PENDING'?'b-pending':s==='CANCELLED'?'b-cancelled':TRANS_KEYS.has(s)?'b-blue':'b-gray';
const slbl    = s  => STATUSES.find(x=>x.k===s)?.l||s;
const badge   = s  => `<span class="badge ${scls(s)}">${slbl(s)}</span>`;
const fmtDate = d  => { try{return new Date(d+'T12:00:00').toLocaleDateString('es',{weekday:'short',day:'2-digit',month:'short'})}catch{return d} };
const tcls    = t  => t==='DELIVERY'?'t-delivery':t==='PICKUP'?'t-pickup':'t-rentals';
const mlabel  = m  => { const [y,mo]=m.split('-'); return new Date(+y,+mo-1,1).toLocaleDateString('es',{month:'short',year:'2-digit'}) };

function calcSummary() {
  const done = S.dels.filter(d=>d.status==='DELIVERED');
  const ti   = done.reduce((s,d)=>s+(d.itemCharge||0),0);
  const td   = done.reduce((s,d)=>s+(d.deliveryCharge||0),0);
  const te   = S.exps.reduce((s,e)=>s+(e.amount||0),0);
  const biz  = {};
  done.forEach(d=>{ const b=d.businessName||'Otro'; if(!biz[b])biz[b]=0; biz[b]+=(d.itemCharge||0)+(d.deliveryCharge||0) });
  const cnt = {
    tot:S.dels.length,
    del:done.length,
    pen:S.dels.filter(d=>d.status==='PENDING').length,
    can:S.dels.filter(d=>['CANCELLED','NO_ANSWER'].includes(d.status)).length,
    tr: S.dels.filter(d=>TRANS_KEYS.has(d.status)).length,
  };
  return {ti,td,tc:ti+td,te,bal:(ti+td)-te,biz,cnt};
}

// ═══════════ ACTIONS ═══════════
function loadSheets()   { S.sheets=LS.get('gds_sheets')||[] }
function saveSheets()   { LS.set('gds_sheets',S.sheets) }
function loadSheet(id)  { S.dels=LS.get('gds_d_'+id)||[]; S.exps=LS.get('gds_e_'+id)||[] }
function saveDels()     { LS.set('gds_d_'+S.currentId,S.dels) }
function saveExps()     { LS.set('gds_e_'+S.currentId,S.exps) }

function openSheet(id) {
  S.currentId=id; S.view='sheet'; S.filterStatus='all'; S.search='';
  S.showForm=false; S.showSummary=false; S.expandedId=null; S.confirmId=null; S.editId=null;
  loadSheet(id); render();
}
function goHome() { S.view='home'; S.currentId=null; S.showNewSheet=false; S.showForm=false; S.showSummary=false; render() }
function setStatus(id,st) { S.dels=S.dels.map(d=>d.id===id?{...d,status:st}:d); S.expandedId=null; saveDels(); renderDelList() }
function removeDel(id)    { S.dels=S.dels.filter(d=>d.id!==id); S.expandedId=null; S.confirmId=null; saveDels(); renderDelList() }
function removeExp(id)    { S.exps=S.exps.filter(e=>e.id!==id); saveExps(); render() }
function deleteSheet(id)  { S.sheets=S.sheets.filter(s=>s.id!==id); saveSheets(); LS.del('gds_d_'+id); LS.del('gds_e_'+id); goHome() }

function saveDel(data) {
  if(data.id) S.dels=S.dels.map(d=>d.id===data.id?data:d);
  else S.dels=[...S.dels,{...data,id:uid()}];
  S.showForm=false; S.editId=null; S.expandedId=null; saveDels(); render();
}
function saveExp(data) { S.exps=[...S.exps,{...data,id:uid()}]; S.showNewExp=false; saveExps(); render() }
function createSheet(data) { const s={id:uid(),...data}; S.sheets=[s,...S.sheets]; saveSheets(); S.showNewSheet=false; openSheet(s.id) }

// ═══════════ RENDER ═══════════
function render() {
  document.getElementById('app').innerHTML = S.view==='home' ? rHome() : rSheet();
  attachEvents();
}

// ── HOME ──
function filteredSheets() {
  let list = S.sheets;
  if (S.month) list=list.filter(s=>s.date.startsWith(S.month));
  if (S.homeSearch) { const q=S.homeSearch.toLowerCase(); list=list.filter(s=>s.driver.toLowerCase().includes(q)||s.date.includes(q)||(s.sheetName||'').toLowerCase().includes(q)) }
  if (S.homeDate) list = list.filter(s => s.date === S.homeDate);
  return list.slice().sort((a,b)=>b.date.localeCompare(a.date));
}

function rHomeList() {
  const list = filteredSheets();
  const total   = list.length;
  const visible = list.slice(0, S.homeOffset + PAGE_SIZE);
  const groups  = {};
  visible.forEach(s=>{ if(!groups[s.date])groups[s.date]=[]; groups[s.date].push(s) });
  const dates = Object.keys(groups).sort((a,b)=>b.localeCompare(a));

  const listHtml = dates.length===0
    ? `<div class="empty"><div class="empty-icon">📦</div><div>${S.homeSearch||S.month||S.homeDate?'Sin resultados para este filtro.':'Sin hojas.'}</div></div>`
    : dates.map(d=>`
        <div class="sec-lbl">${fmtDate(d)} · ${d}</div>
        ${groups[d].map(s=>`
          <div class="sheet-card" data-open="${s.id}">
            <div><div class="sc-name">${s.driver}</div><div class="sc-sub">${s.sheetName||s.date}</div></div>
            <div class="sc-right"><span class="tag ${tcls(s.type)}">${s.type}</span><span class="text3" style="font-size:18px">›</span></div>
          </div>`).join('')}
      `).join('');

  const more = visible.length<total ? `<div class="load-more"><button class="btn" id="load-more-btn">Ver más (${total-visible.length} restantes)</button></div>` : '';
  return listHtml + more;
}

function rHome() {
  const nav = `<nav class="nav">
    <div class="nav-info"><div class="nav-title">General Delivery Sheet</div><div class="nav-sub">${S.sheets.length} hojas importadas</div></div>
    <button class="nav-btn ${S.showNewSheet?'ghost':''}" id="na">${S.showNewSheet?'Cancelar':'+ Nueva Hoja'}</button>
  </nav>`;

  const hstats = `<div class="home-stats">
    <div class="hstat"><div class="hstat-val">${S.sheets.length}</div><div class="hstat-lbl">Hojas</div></div>
    <div class="hstat"><div class="hstat-val">${S.sheets.filter(s=>s.driver==='MR. NURSE').length}</div><div class="hstat-lbl">MR. NURSE</div></div>
    <div class="hstat"><div class="hstat-val">${S.sheets.filter(s=>s.driver==='MR. GRANT').length}</div><div class="hstat-lbl">MR. GRANT</div></div>
    <div class="hstat"><div class="hstat-val">${S.sheets.filter(s=>s.type==='PICKUP').length}</div><div class="hstat-lbl">Pickups</div></div>
  </div>`;

  const monthBar = `<div class="month-bar">
    <button class="mchip ${!S.month?'active':''}" data-month="">Todos</button>
    ${MONTHS.map(m=>`<button class="mchip ${S.month===m?'active':''}" data-month="${m}">${mlabel(m)}</button>`).join('')}
  </div>`;

  const searchBar = `
    <div class="home-filter-bar">
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input id="home-search" class="fc search-ic" type="search" value="${S.homeSearch}" placeholder="Buscar conductor, cliente...">
      </div>
      <div class="date-wrap">
        <span class="date-ico">📅</span>
        <input id="home-date" type="date" class="${S.homeDate?'on':''}" value="${S.homeDate}">
        <button class="date-x" id="date-x">✕</button>
      </div>
    </div>`;;

  const newForm = S.showNewSheet ? `<div class="card">
    <div class="card-title">Nueva hoja</div>
    <div class="fg"><label class="fl">Fecha</label><input id="ns-d" class="fc" type="date" value="${today()}"></div>
    <div class="fg"><label class="fl">Conductor</label><select id="ns-dr" class="fc">${DRIVERS.map(d=>`<option>${d}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Tipo</label><select id="ns-t" class="fc">${TYPES.map(t=>`<option>${t}</option>`).join('')}</select></div>
    <div class="flex gap-8 mt-14"><button class="btn f1" id="ns-cancel">Cancelar</button><button class="btn btn-p f1" id="ns-ok">Crear</button></div>
  </div>` : '';

  const resetRow = `<div style="text-align:right;margin-bottom:8px">
    <button class="btn btn-sm text3" id="reset-btn" style="font-size:11px">&#8635; Reimportar Excel</button>
  </div>`;

  return `${nav}<div class="page">${hstats}${resetRow}${monthBar}${searchBar}${newForm}<div id="home-list">${rHomeList()}</div></div>`;
}

// ── SHEET ──
function rDelItems() {
  let list = S.dels;
  if (S.filterStatus==='pending')     list=list.filter(d=>d.status==='PENDING');
  if (S.filterStatus==='delivered')   list=list.filter(d=>d.status==='DELIVERED');
  if (S.filterStatus==='cancelled')   list=list.filter(d=>['CANCELLED','NO_ANSWER'].includes(d.status));
  if (S.filterStatus==='transferred') list=list.filter(d=>TRANS_KEYS.has(d.status));
  if (S.search) { const q=S.search.toLowerCase(); list=list.filter(d=>(d.name||'').toLowerCase().includes(q)||(d.location||'').toLowerCase().includes(q)||(d.businessName||'').toLowerCase().includes(q)) }

  if (!list.length) return `<div class="empty"><div class="empty-icon">🔍</div><div>Sin resultados</div></div>`;
  return list.map(d=>{
    const exp=S.expandedId===d.id, tot=(d.itemCharge||0)+(d.deliveryCharge||0), conf=S.confirmId===d.id;
    return `<div class="di ${exp?'expanded':''}" data-xp="${d.id}">
      <div class="di-row">
        <div style="flex:1;min-width:0">
          <div class="di-name">${d.name||'(Sin nombre)'}</div>
          <div class="di-meta">${[d.location,d.businessName].filter(Boolean).join(' · ')}</div>
          ${d.contact?`<div class="di-meta">${d.contact}</div>`:''}
          ${d.notes?`<div class="di-notes">${d.notes}</div>`:''}
        </div>
        <div class="di-right">${badge(d.status)}<div class="di-amount">${fmt(tot)}</div></div>
      </div>
      ${exp?`<div class="di-actions" onclick="event.stopPropagation()">
        <div class="di-actions-lbl">Cambiar estado:</div>
        <div class="status-grid">${STATUSES.map(s=>`<button class="sq-btn" data-ss="${d.id}" data-sv="${s.k}">${s.l}</button>`).join('')}</div>
        ${conf
          ?`<div class="confirm-box"><div class="confirm-text">¿Eliminar esta entrega?</div><div class="flex gap-8"><button class="btn btn-sm f1" data-cnx>Cancelar</button><button class="btn btn-sm btn-d f1" data-cdel="${d.id}">Sí, eliminar</button></div></div>`
          :`<div class="flex gap-8 mt-10"><button class="btn btn-sm f1" data-edit="${d.id}">Editar</button><button class="btn btn-sm btn-d" data-askd="${d.id}">Eliminar</button></div>`}
      </div>`:''}
    </div>`;
  }).join('');
}

function rSheet() {
  const sh=S.sheets.find(s=>s.id===S.currentId); if(!sh){goHome();return''}
  const sum=calcSummary(), pct=sum.cnt.tot>0?Math.round(sum.cnt.del/sum.cnt.tot*100):0;
  const nav=`<nav class="nav">
    <button class="nav-back show" id="nb">‹</button>
    <div class="nav-info"><div class="nav-title">${sh.driver}</div><div class="nav-sub">${fmtDate(sh.date)} · ${sh.type}</div></div>
    <button class="nav-btn ${S.showSummary?'ghost':''}" id="na">${S.showSummary?'Lista':'Resumen'}</button>
  </nav>`;
  if (S.showForm) return `${nav}<div class="page">${rForm()}</div>`;
  if (S.showSummary) return `${nav}<div class="page">${rSummary(sum)}</div>`;
  const filters=`<div class="filters">
    <button class="chip ${S.filterStatus==='all'?'active':''}" data-f="all">Todos (${sum.cnt.tot})</button>
    <button class="chip ${S.filterStatus==='pending'?'active':''}" data-f="pending">Pend. (${sum.cnt.pen})</button>
    <button class="chip ${S.filterStatus==='delivered'?'active':''}" data-f="delivered">Entregados (${sum.cnt.del})</button>
    <button class="chip ${S.filterStatus==='cancelled'?'active':''}" data-f="cancelled">Cancel. (${sum.cnt.can})</button>
    <button class="chip ${S.filterStatus==='transferred'?'active':''}" data-f="transferred">Otros (${sum.cnt.tr})</button>
  </div>`;
  const search=`<div class="search-wrap"><span class="search-icon">🔍</span><input id="del-search" class="fc search-ic" type="search" value="${S.search}" placeholder="Buscar cliente, ubicación, proveedor..."></div>`;
  const confSheet=S.confirmId==='sheet'?`<div class="confirm-box" style="margin-top:10px"><div class="confirm-text">¿Eliminar esta hoja y todas sus entregas?</div><div class="flex gap-8"><button class="btn btn-sm f1" data-cnx>Cancelar</button><button class="btn btn-sm btn-d f1" data-cds="${sh.id}">Sí, eliminar</button></div></div>`:'';
  return `${nav}<div class="page">
    <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="stats">
      <div class="stat"><div class="sl">Entregados</div><div class="sv green">${sum.cnt.del}</div></div>
      <div class="stat"><div class="sl">Cobrado</div><div class="sv">${fmt(sum.tc)}</div></div>
      <div class="stat"><div class="sl">Pendientes</div><div class="sv accent">${sum.cnt.pen}</div></div>
    </div>
    ${filters}${search}
    <div id="del-list">${rDelItems()}</div>
    <div class="mt-14"><button class="btn btn-p btn-full" id="add-del">+ Agregar entrega</button></div>
    <div class="mt-10"><button class="btn btn-full text3" id="del-sheet-btn">Eliminar hoja</button></div>
    ${confSheet}
  </div>`;
}

// ── PARTIAL UPDATES ──
function renderHomeList() {
  const el=document.getElementById('home-list');
  if(!el){render();return}
  el.innerHTML=rHomeList();
  const lm=document.getElementById('load-more-btn');
  if(lm) lm.addEventListener('click',()=>{S.homeOffset+=PAGE_SIZE;renderHomeList()});
}
function renderDelList() {
  const el=document.getElementById('del-list');
  if(!el){render();return}
  el.innerHTML=rDelItems();
}

// ── FORM ──
function rForm() {
  const d=S.editId?S.dels.find(x=>x.id===S.editId)||{}:{}, ie=!!d.id;
  return `<div class="card">
    <div class="card-title">${ie?'Editar entrega':'Nueva entrega'}</div>
    <div class="fg"><label class="fl">Nombre *</label><input id="f-n" class="fc" type="text" value="${d.name||''}" placeholder="HILARY DAVIDSON" style="text-transform:uppercase"></div>
    <div class="fg"><label class="fl">Ubicación</label><input id="f-l" class="fc" type="text" value="${d.location||''}" placeholder="PRASHAD NAGAR"></div>
    <div class="fg"><label class="fl">Teléfono</label><input id="f-c" class="fc" type="tel" value="${d.contact||''}" placeholder="609-4480"></div>
    <div class="fg"><label class="fl">Negocio / Proveedor</label><input id="f-b" class="fc" list="biz-list" value="${d.businessName||''}" placeholder="Escribe o selecciona..."><datalist id="biz-list">${BUSINESSES.map(b=>`<option value="${b}">`).join('')}</datalist></div>
    <div class="fr">
      <div class="fg"><label class="fl">Cargo item (G$)</label><input id="f-i" class="fc" type="number" min="0" value="${d.itemCharge||''}"></div>
      <div class="fg"><label class="fl">Cargo entrega (G$)</label><input id="f-dc" class="fc" type="number" min="0" value="${d.deliveryCharge||''}"></div>
    </div>
    <div class="fg"><label class="fl">Estado</label><select id="f-s" class="fc">${STATUSES.map(s=>`<option value="${s.k}" ${(d.status||'PENDING')===s.k?'selected':''}>${s.l}</option>`).join('')}</select></div>
    <div class="fg"><label class="fl">Notas</label><input id="f-no" class="fc" type="text" value="${d.notes||''}" placeholder="Instrucciones..."></div>
    <div class="flex gap-8 mt-14"><button class="btn f1" id="form-cancel">Cancelar</button><button class="btn btn-p f1" id="form-ok">${ie?'Guardar':'Agregar'}</button></div>
  </div>`;
}

// ── SUMMARY ──
function rSummary(sum) {
  const biz=Object.entries(sum.biz).sort((a,b)=>b[1]-a[1]);
  const expForm=S.showNewExp?`<div style="background:var(--surface2);border-radius:var(--r2);padding:12px;margin-bottom:10px">
    <div class="fr" style="margin-bottom:8px">
      <div><label class="fl">Tipo</label><select id="et" class="fc" style="font-size:12px">${EXP_T.map(e=>`<option>${e}</option>`).join('')}</select></div>
      <div><label class="fl">Monto (G$)</label><input id="ea" class="fc" type="number" min="0" placeholder="0" style="font-size:12px"></div>
    </div>
    <div class="flex gap-8"><button class="btn f1 btn-sm" id="exp-cancel">Cancelar</button><button class="btn btn-p f1 btn-sm" id="exp-ok">Agregar</button></div>
  </div>`:'';
  return `
    <div class="stats stats-2">
      <div class="stat"><div class="sl">Total cobrado</div><div class="sv accent">${fmt(sum.tc)}</div></div>
      <div class="stat"><div class="sl">Gastos</div><div class="sv red">−${fmt(sum.te)}</div></div>
      <div class="stat"><div class="sl">Balance neto</div><div class="sv ${sum.bal>=0?'green':'red'}">${fmt(sum.bal)}</div></div>
      <div class="stat"><div class="sl">Entregados</div><div class="sv">${sum.cnt.del} / ${sum.cnt.tot}</div></div>
    </div>
    <div class="card">
      <div class="flex ai jb" style="margin-bottom:10px"><div class="card-title" style="margin:0">Gastos</div><button class="btn btn-sm" id="add-exp">+ Gasto</button></div>
      ${expForm}
      ${!S.exps.length?`<div class="text3" style="font-size:13px;text-align:center;padding:10px">Sin gastos</div>`:S.exps.map(e=>`<div class="dr"><div class="dn">${e.type}</div><div class="flex ai gap-8"><div class="dv">−${fmt(e.amount)}</div><button class="btn btn-sm btn-d" data-dexp="${e.id}" style="padding:2px 8px">✕</button></div></div>`).join('')}
    </div>
    ${biz.length?`<div class="card"><div class="card-title">Desembolso por proveedor</div>${biz.map(([b,a])=>`<div class="dr"><div class="dn">${b}</div><div class="dv">${fmt(a)}</div></div>`).join('')}</div>`:''}
    <div class="card"><div class="card-title text2">Desglose</div>
      <div class="dr"><div class="dn">Items</div><div class="dv">${fmt(sum.ti)}</div></div>
      <div class="dr"><div class="dn">Delivery fees</div><div class="dv">${fmt(sum.td)}</div></div>
      <div class="dr" style="border-top:2px solid var(--border2);padding-top:9px;margin-top:3px"><div style="font-weight:700">Total</div><div class="dv" style="color:var(--accent)">${fmt(sum.tc)}</div></div>
    </div>`;
}

// ═══════════ EVENTS ═══════════
function attachEvents() {
  const $  = id => document.getElementById(id);
  const app= document.getElementById('app');

  app.addEventListener('click', e => {
    const t=e.target.closest('[data-open],[data-xp],[data-ss],[data-f],[data-edit],[data-askd],[data-cdel],[data-cds],[data-cnx],[data-dexp],[data-month]');
    if(!t) return;
    if(t.dataset.open)  { openSheet(t.dataset.open); return }
    if(t.dataset.xp)    { S.expandedId=S.expandedId===t.dataset.xp?null:t.dataset.xp; S.confirmId=null; renderDelList(); return }
    if(t.dataset.ss)    { setStatus(t.dataset.ss,t.dataset.sv); return }
    if(t.dataset.f)     { S.filterStatus=t.dataset.f; renderDelList(); return }
    if(t.dataset.edit)  { S.editId=t.dataset.edit; S.showForm=true; render(); return }
    if(t.dataset.askd)  { S.confirmId=t.dataset.askd; renderDelList(); return }
    if(t.dataset.cdel)  { removeDel(t.dataset.cdel); return }
    if(t.dataset.cds)   { deleteSheet(t.dataset.cds); return }
    if(t.dataset.cnx)   { S.confirmId=null; renderDelList(); return }
    if(t.dataset.dexp)  { removeExp(t.dataset.dexp); return }
    if('month' in t.dataset) { S.month=t.dataset.month; S.homeOffset=0; render(); return }
  });

  const nb=$('nb'); if(nb) nb.addEventListener('click',goHome);
  const na=$('na'); if(na) na.addEventListener('click',()=>{
    if(S.view==='home'){S.showNewSheet=!S.showNewSheet;render()}
    if(S.view==='sheet'){S.showSummary=!S.showSummary;S.showForm=false;render()}
  });
  const nsc=$('ns-cancel'),nso=$('ns-ok');
  if(nsc) nsc.addEventListener('click',()=>{S.showNewSheet=false;render()});
  if(nso) nso.addEventListener('click',()=>{const d=$('ns-d').value,dr=$('ns-dr').value,t=$('ns-t').value;if(!d)return;createSheet({date:d,driver:dr,type:t})});
  const fc2=$('form-cancel'),fo=$('form-ok');
  if(fc2) fc2.addEventListener('click',()=>{S.showForm=false;S.editId=null;render()});
  if(fo)  fo.addEventListener('click',()=>{
    const name=($('f-n').value||'').toUpperCase().trim();if(!name){alert('Nombre requerido');return}
    saveDel({id:S.editId||undefined,name,location:$('f-l').value.trim(),contact:$('f-c').value.trim(),businessName:$('f-b').value.trim(),itemCharge:parseInt($('f-i').value)||0,deliveryCharge:parseInt($('f-dc').value)||0,status:$('f-s').value,notes:$('f-no').value.trim()});
  });
  const ad=$('add-del'); if(ad) ad.addEventListener('click',()=>{S.showForm=true;S.editId=null;render()});
  const ds=$('del-sheet-btn'); if(ds) ds.addEventListener('click',()=>{S.confirmId='sheet';render()});
  const ae=$('add-exp'); if(ae) ae.addEventListener('click',()=>{S.showNewExp=!S.showNewExp;render()});
  const ec=$('exp-cancel'),eo=$('exp-ok');
  if(ec) ec.addEventListener('click',()=>{S.showNewExp=false;render()});
  if(eo) eo.addEventListener('click',()=>{const a=parseInt($('ea').value)||0;if(!a)return;saveExp({type:$('et').value,amount:a})});
  const rb=$('reset-btn'); if(rb) rb.addEventListener('click',async()=>{
    if(!confirm('¿Reimportar todos los datos del Excel?')) return;
    LS.del('gds_version');
    document.getElementById('app').style.display='none';
    document.getElementById('loader').style.display='flex';
    await seedIfNeeded(); loadSheets(); hideLoader(); render();
  });
  const lm=$('load-more-btn'); if(lm) lm.addEventListener('click',()=>{S.homeOffset+=PAGE_SIZE;renderHomeList()});

  // Search — direct update, no debounce needed (partial render is fast)
  const hs=$('home-search');
  if(hs){
    hs.addEventListener('input',e=>{
      const v=e.target.value,p=e.target.selectionStart;
      S.homeSearch=v;S.homeOffset=0;renderHomeList();
      const el=$('home-search');if(el){el.focus();el.setSelectionRange(p,p);}
    });
    hs.focus();
  }
  const hd=$('home-date');
  if(hd) hd.addEventListener('change',e=>{S.homeDate=e.target.value;S.homeOffset=0;render();});
  const dx=$('date-x');
  if(dx) dx.addEventListener('click',e=>{e.stopPropagation();S.homeDate='';render();});
  const ds2=$('del-search');
  if(ds2){
    ds2.addEventListener('input',e=>{
      const v=e.target.value,p=e.target.selectionStart;
      S.search=v;renderDelList();
      const el=$('del-search');if(el){el.focus();el.setSelectionRange(p,p);}
    });
    ds2.focus();
  }
}

// ═══════════ INIT ═══════════
(async () => {
  setLoader('Verificando datos...', 10);
  await seedIfNeeded();
  loadSheets();
  hideLoader();
  render();
})();
</script>
</body>
</html>
