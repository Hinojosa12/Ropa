<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>General Delivery Sheet</title>
  <style>
    /* ─── Reset & Base ─── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f2ed;
      --surface:   #ffffff;
      --surface2:  #f0ede7;
      --border:    #e0dbd0;
      --border2:   #c8c2b4;
      --text:      #1a1714;
      --text2:     #6b6459;
      --text3:     #9e968a;
      --accent:    #c8841a;
      --accent-bg: #fdf3e3;
      --accent-bd: #f0c87a;
      --green:     #2e7d4f;
      --green-bg:  #eaf4ee;
      --green-bd:  #a8d9b8;
      --red:       #b83232;
      --red-bg:    #fdf0f0;
      --red-bd:    #f0b8b8;
      --blue:      #1a5fa8;
      --blue-bg:   #eef4fc;
      --blue-bd:   #b0cef0;
      --gray:      #5f5e5a;
      --gray-bg:   #f1efe8;
      --gray-bd:   #d3d1c7;
      --radius:    10px;
      --radius-sm: 6px;
      --shadow:    0 1px 3px rgba(0,0,0,.08);
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── Nav ─── */
    .nav {
      position: sticky; top: 0; z-index: 50;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 20px;
      display: flex; align-items: center; gap: 10px;
    }
    .nav-back {
      display: none; align-items: center; justify-content: center;
      width: 34px; height: 34px; cursor: pointer;
      border-radius: var(--radius-sm); border: 1px solid var(--border2);
      color: var(--text); background: transparent; font-size: 20px;
      flex-shrink: 0; transition: background .15s;
    }
    .nav-back:hover { background: var(--surface2); }
    .nav-back.show { display: flex; }
    .nav-info { flex: 1; min-width: 0; }
    .nav-title { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .nav-sub   { font-size: 11px; color: var(--text3); margin-top: 1px; }
    .nav-action {
      flex-shrink: 0; cursor: pointer;
      border: 1px solid var(--accent-bd); border-radius: var(--radius-sm);
      padding: 7px 14px; background: var(--accent); color: #fff;
      font-size: 13px; font-weight: 600; transition: opacity .15s;
    }
    .nav-action:hover { opacity: .88; }
    .nav-action.ghost {
      background: transparent; color: var(--text2); border-color: var(--border2);
    }

    /* ─── Page ─── */
    .page {
      max-width: 640px; margin: 0 auto;
      padding: 20px 20px 80px;
    }

    /* ─── Cards ─── */
    .card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 18px; margin-bottom: 12px;
      box-shadow: var(--shadow);
    }
    .card-title { font-size: 14px; font-weight: 600; margin-bottom: 16px; }

    /* ─── Badges ─── */
    .badge {
      display: inline-flex; align-items: center;
      padding: 3px 9px; border-radius: 999px;
      font-size: 11px; font-weight: 600; border: 1px solid;
    }
    .b-delivered { background: var(--green-bg); color: var(--green); border-color: var(--green-bd); }
    .b-pending   { background: var(--accent-bg); color: var(--accent); border-color: var(--accent-bd); }
    .b-cancelled { background: var(--red-bg);  color: var(--red);   border-color: var(--red-bd);   }
    .b-gray      { background: var(--gray-bg); color: var(--gray);  border-color: var(--gray-bd);  }
    .b-blue      { background: var(--blue-bg); color: var(--blue);  border-color: var(--blue-bd);  }

    /* ─── Sheet type tags ─── */
    .tag { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .04em; }
    .tag-delivery { background: var(--blue-bg);  color: var(--blue);  }
    .tag-pickup   { background: var(--green-bg); color: var(--green); }
    .tag-rentals  { background: var(--accent-bg); color: var(--accent); }

    /* ─── Stats ─── */
    .stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 16px; }
    .stats-2 { grid-template-columns: repeat(2, 1fr); }
    .stat { background: var(--surface2); border-radius: var(--radius-sm); padding: 12px 14px; }
    .stat-label { font-size: 11px; color: var(--text3); margin-bottom: 4px; }
    .stat-value { font-size: 20px; font-weight: 700; color: var(--text); }
    .stat-value.green { color: var(--green); }
    .stat-value.red   { color: var(--red);   }
    .stat-value.accent { color: var(--accent); }

    /* ─── Filter chips ─── */
    .filters { display: flex; gap: 6px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 4px; }
    .filters::-webkit-scrollbar { display: none; }
    .chip {
      flex-shrink: 0; padding: 5px 13px; border-radius: 999px;
      border: 1px solid var(--border2); font-size: 12px; font-weight: 500;
      cursor: pointer; background: transparent; color: var(--text2);
      transition: all .15s;
    }
    .chip.active { background: var(--accent); color: #fff; border-color: var(--accent); }

    /* ─── Progress bar ─── */
    .progress { height: 5px; background: var(--surface2); border-radius: 3px; overflow: hidden; margin-bottom: 16px; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s; }

    /* ─── Delivery items ─── */
    .delivery-item {
      border: 1px solid var(--border); border-radius: var(--radius);
      padding: 14px 16px; margin-bottom: 8px; background: var(--surface);
      cursor: pointer; transition: border-color .15s;
    }
    .delivery-item:hover  { border-color: var(--border2); }
    .delivery-item.expanded { border-color: var(--accent-bd); }
    .di-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .di-name { font-size: 14px; font-weight: 600; margin-bottom: 3px; }
    .di-meta { font-size: 12px; color: var(--text2); }
    .di-notes { font-size: 12px; color: var(--text3); font-style: italic; margin-top: 3px; }
    .di-right { text-align: right; flex-shrink: 0; }
    .di-amount { font-size: 13px; font-weight: 700; margin-top: 6px; }
    .di-actions { margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
    .di-actions-label { font-size: 11px; color: var(--text3); margin-bottom: 8px; font-weight: 500; }

    /* ─── Quick status buttons ─── */
    .status-grid { display: flex; flex-wrap: wrap; gap: 6px; }
    .sq-btn {
      padding: 4px 11px; border-radius: 999px; font-size: 11px; font-weight: 600;
      cursor: pointer; border: 1px solid var(--border2);
      background: transparent; color: var(--text2); transition: all .12s;
    }
    .sq-btn:hover { border-color: var(--accent); color: var(--accent); }

    /* ─── Edit/Delete row ─── */
    .di-edit-row { display: flex; gap: 8px; margin-top: 10px; }

    /* ─── Forms ─── */
    .form-group { margin-bottom: 14px; }
    .form-label { display: block; font-size: 12px; font-weight: 600; color: var(--text2); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .03em; }
    .form-control {
      width: 100%; padding: 10px 13px;
      border: 1px solid var(--border2); border-radius: var(--radius-sm);
      font-size: 14px; font-family: inherit;
      background: var(--surface); color: var(--text);
      transition: border-color .15s;
    }
    .form-control:focus { outline: none; border-color: var(--accent); }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

    /* ─── Buttons ─── */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 6px;
      padding: 10px 18px; border-radius: var(--radius-sm); border: 1px solid var(--border2);
      font-size: 13px; font-weight: 600; cursor: pointer;
      background: transparent; color: var(--text); transition: all .15s; font-family: inherit;
    }
    .btn:hover { background: var(--surface2); }
    .btn-primary { background: var(--accent); color: #fff; border-color: var(--accent); }
    .btn-primary:hover { opacity: .88; background: var(--accent); }
    .btn-danger  { background: var(--red-bg);  color: var(--red); border-color: var(--red-bd); }
    .btn-full { width: 100%; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }

    /* ─── Disbursement table ─── */
    .disb-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 9px 0; border-bottom: 1px solid var(--border); font-size: 13px;
    }
    .disb-row:last-child { border-bottom: none; }
    .disb-name  { color: var(--text2); }
    .disb-value { font-weight: 700; }

    /* ─── Section label ─── */
    .section-label {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: .07em;
      margin: 20px 0 8px;
    }
    .section-label:first-child { margin-top: 0; }

    /* ─── Empty / loading ─── */
    .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
    .empty-icon { font-size: 44px; margin-bottom: 12px; }
    .empty-text { font-size: 14px; }

    /* ─── Flex helpers ─── */
    .flex   { display: flex; }
    .ai     { align-items: center; }
    .jb     { justify-content: space-between; }
    .gap-8  { gap: 8px; }
    .gap-10 { gap: 10px; }
    .f1     { flex: 1; }
    .mt-12  { margin-top: 12px; }
    .mt-16  { margin-top: 16px; }

    /* ─── Search ─── */
    .search-wrap { position: relative; margin-bottom: 14px; }
    .search-icon { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text3); font-size: 14px; pointer-events: none; }
    .search-input { padding-left: 36px !important; }

    /* ─── Confirm dialog (inline) ─── */
    .confirm-box {
      background: var(--red-bg); border: 1px solid var(--red-bd);
      border-radius: var(--radius-sm); padding: 12px 14px; margin-top: 8px;
    }
    .confirm-text { font-size: 13px; color: var(--red); margin-bottom: 10px; font-weight: 500; }
  </style>
</head>
<body>

<div id="app"></div>

<script>
// ═══════════════════════════════════════════════════
//  CONSTANTS
// ═══════════════════════════════════════════════════

const DRIVERS = ['MR. NURSE', 'MR. GRANT', 'MARK THOMAS', 'MARK', 'JERREL', 'MR. MAYERS', 'OTRO'];
const TYPES   = ['DELIVERY', 'PICKUP', 'RENTALS'];

const BUSINESSES = [
  'CARIBZOOM','DGA','PPS','DC','BZ','HE','ZP','PH','HJ','OD',
  'NATIVE','COLLAGE','ROSE','KAY','THURSTON','MARYAM','SHANIAH',
  'GLAMOUR','FIONA','CHRISTINE','DAC','BLISS','XFINITY','LUMIERE',
  'CHATRAM','PINK RIBBON','PINK HEAVEN','ARTYSCRAFT','LIVITY',
  '592 EVENTS','SUSANA','PSS','DIY','LUMIERE SPEC','STYLE & COMFORT','KAY'
].filter((v, i, a) => a.indexOf(v) === i);

const EXPENSE_TYPES = ['GAS','BOTELLAS','COMIDA','POLVO','SILLAS','BUSES','PASAJE','REPUESTO','OTRO'];

const STATUSES = [
  { key: 'PENDING',     label: 'Pendiente',     cls: 'b-pending'   },
  { key: 'DELIVERED',   label: 'Entregado',      cls: 'b-delivered' },
  { key: 'CANCELLED',   label: 'Cancelado',      cls: 'b-cancelled' },
  { key: 'NO_ANSWER',   label: 'Sin respuesta',  cls: 'b-gray'      },
  { key: 'RETURNED',    label: 'Devuelto',        cls: 'b-gray'      },
  { key: 'MARK',        label: '→ Mark',          cls: 'b-blue'      },
  { key: 'GRANT',       label: '→ Grant',         cls: 'b-blue'      },
  { key: 'NURSE',       label: '→ Nurse',         cls: 'b-blue'      },
  { key: 'TRANSFERRED', label: 'Transferido',     cls: 'b-blue'      },
];

const TRANSFERRED_KEYS = ['MARK', 'GRANT', 'NURSE', 'TRANSFERRED', 'RETURNED'];


// ═══════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════

const state = {
  view:       'home',   // 'home' | 'sheet'
  sheets:     [],
  currentId:  null,
  deliveries: [],
  expenses:   [],

  // UI flags
  showNewSheet:  false,
  showForm:      false,
  showSummary:   false,
  showNewExpense: false,
  expandedId:    null,
  confirmDeleteId: null,
  editingId:     null,
  filterStatus:  'all',
  searchText:    '',
};


// ═══════════════════════════════════════════════════
//  LOCAL STORAGE
// ═══════════════════════════════════════════════════

const LS = {
  get(key) {
    try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; }
    catch { return null; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); }
    catch { /* storage full, ignore */ }
  },
  del(key) {
    try { localStorage.removeItem(key); }
    catch {}
  },
};

function loadSheets()         { state.sheets     = LS.get('gds_sheets')           || []; }
function saveSheets()         { LS.set('gds_sheets', state.sheets); }
function loadDeliveries(id)   { state.deliveries = LS.get('gds_d_' + id)          || []; }
function saveDeliveries()     { LS.set('gds_d_' + state.currentId, state.deliveries); }
function loadExpenses(id)     { state.expenses   = LS.get('gds_e_' + id)          || []; }
function saveExpenses()       { LS.set('gds_e_' + state.currentId, state.expenses); }


// ═══════════════════════════════════════════════════
//  HELPERS
// ═══════════════════════════════════════════════════

const uid  = () => Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
const today = () => new Date().toISOString().split('T')[0];

function fmtMoney(n) {
  return 'G$' + (n || 0).toLocaleString('en');
}

function fmtDate(d) {
  try {
    return new Date(d + 'T12:00:00').toLocaleDateString('es', {
      weekday: 'short', day: '2-digit', month: 'short', year: 'numeric'
    });
  } catch { return d; }
}

function statusBadge(s) {
  const st = STATUSES.find(x => x.key === s) || { label: s, cls: 'b-gray' };
  return `<span class="badge ${st.cls}">${st.label}</span>`;
}

function statusClass(s) {
  if (s === 'DELIVERED') return 'delivered';
  if (s === 'PENDING')   return 'pending';
  if (s === 'CANCELLED' || s === 'NO_ANSWER') return 'cancelled';
  if (TRANSFERRED_KEYS.includes(s)) return 'blue';
  return 'gray';
}

function sheetTagClass(type) {
  return type === 'DELIVERY' ? 'tag-delivery' : type === 'PICKUP' ? 'tag-pickup' : 'tag-rentals';
}

function calcSummary() {
  const done = state.deliveries.filter(d => d.status === 'DELIVERED');
  const totalItems    = done.reduce((s, d) => s + (d.itemCharge || 0), 0);
  const totalDelivery = done.reduce((s, d) => s + (d.deliveryCharge || 0), 0);
  const totalCollection = totalItems + totalDelivery;
  const totalExpenses = state.expenses.reduce((s, e) => s + (e.amount || 0), 0);

  const byBusiness = {};
  done.forEach(d => {
    const biz = d.businessName || 'Otro';
    if (!byBusiness[biz]) byBusiness[biz] = { items: 0, delivery: 0 };
    byBusiness[biz].items    += d.itemCharge    || 0;
    byBusiness[biz].delivery += d.deliveryCharge || 0;
  });

  const counts = {
    total:       state.deliveries.length,
    delivered:   done.length,
    pending:     state.deliveries.filter(d => d.status === 'PENDING').length,
    cancelled:   state.deliveries.filter(d => ['CANCELLED', 'NO_ANSWER'].includes(d.status)).length,
    transferred: state.deliveries.filter(d => TRANSFERRED_KEYS.includes(d.status)).length,
  };

  return { totalCollection, totalItems, totalDelivery, totalExpenses, balance: totalCollection - totalExpenses, byBusiness, counts };
}


// ═══════════════════════════════════════════════════
//  ACTIONS
// ═══════════════════════════════════════════════════

function openSheet(id) {
  state.currentId  = id;
  state.view       = 'sheet';
  state.filterStatus = 'all';
  state.searchText = '';
  state.showForm   = false;
  state.showSummary = false;
  state.expandedId = null;
  loadDeliveries(id);
  loadExpenses(id);
  render();
}

function goHome() {
  state.view = 'home';
  state.currentId = null;
  state.showNewSheet = false;
  render();
}

function createSheet({ date, driver, type }) {
  const sheet = { id: uid(), date, driver, type };
  state.sheets = [sheet, ...state.sheets];
  saveSheets();
  state.showNewSheet = false;
  openSheet(sheet.id);
}

function deleteSheet(id) {
  state.sheets = state.sheets.filter(s => s.id !== id);
  saveSheets();
  LS.del('gds_d_' + id);
  LS.del('gds_e_' + id);
  goHome();
}

function saveDelivery(data) {
  if (data.id) {
    state.deliveries = state.deliveries.map(d => d.id === data.id ? data : d);
  } else {
    state.deliveries = [...state.deliveries, { ...data, id: uid() }];
  }
  saveDeliveries();
  state.showForm   = false;
  state.editingId  = null;
  state.expandedId = null;
  render();
}

function removeDelivery(id) {
  state.deliveries   = state.deliveries.filter(d => d.id !== id);
  state.expandedId   = null;
  state.confirmDeleteId = null;
  saveDeliveries();
  render();
}

function setStatus(id, status) {
  state.deliveries = state.deliveries.map(d => d.id === id ? { ...d, status } : d);
  state.expandedId = null;
  saveDeliveries();
  render();
}

function saveExpense(data) {
  state.expenses = [...state.expenses, { ...data, id: uid() }];
  saveExpenses();
  state.showNewExpense = false;
  render();
}

function removeExpense(id) {
  state.expenses = state.expenses.filter(e => e.id !== id);
  saveExpenses();
  render();
}


// ═══════════════════════════════════════════════════
//  RENDER HELPERS
// ═══════════════════════════════════════════════════

function renderNav({ title, sub, back, action }) {
  return `
    <nav class="nav">
      <button class="nav-back ${back ? 'show' : ''}" id="btn-back">‹</button>
      <div class="nav-info">
        <div class="nav-title">${title}</div>
        ${sub ? `<div class="nav-sub">${sub}</div>` : ''}
      </div>
      ${action ? `<button class="nav-action ${action.ghost ? 'ghost' : ''}" id="nav-action-btn">${action.label}</button>` : ''}
    </nav>`;
}

function renderNewSheetForm() {
  return `
    <div class="card">
      <div class="card-title">Nueva hoja de entrega</div>
      <div class="form-group">
        <label class="form-label">Fecha</label>
        <input id="ns-date" class="form-control" type="date" value="${today()}">
      </div>
      <div class="form-group">
        <label class="form-label">Conductor</label>
        <select id="ns-driver" class="form-control">
          ${DRIVERS.map(d => `<option>${d}</option>`).join('')}
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Tipo</label>
        <select id="ns-type" class="form-control">
          ${TYPES.map(t => `<option>${t}</option>`).join('')}
        </select>
      </div>
      <div class="flex gap-8 mt-16">
        <button class="btn f1" id="ns-cancel">Cancelar</button>
        <button class="btn btn-primary f1" id="ns-submit">Crear hoja</button>
      </div>
    </div>`;
}

function renderDeliveryForm() {
  const d = state.editingId ? state.deliveries.find(x => x.id === state.editingId) || {} : {};
  const isEdit = !!d.id;
  return `
    <div class="card">
      <div class="card-title">${isEdit ? 'Editar entrega' : 'Nueva entrega'}</div>

      <div class="form-group">
        <label class="form-label">Nombre del cliente *</label>
        <input id="f-name" class="form-control" type="text" value="${d.name || ''}" placeholder="HILARY DAVIDSON" style="text-transform:uppercase">
      </div>

      <div class="form-group">
        <label class="form-label">Ubicación</label>
        <input id="f-location" class="form-control" type="text" value="${d.location || ''}" placeholder="PRASHAD NAGAR">
      </div>

      <div class="form-group">
        <label class="form-label">Teléfono</label>
        <input id="f-contact" class="form-control" type="tel" value="${d.contact || ''}" placeholder="609-4480">
      </div>

      <div class="form-group">
        <label class="form-label">Negocio / Proveedor</label>
        <input id="f-business" class="form-control" list="biz-list" value="${d.businessName || ''}" placeholder="Escribe o selecciona...">
        <datalist id="biz-list">
          ${BUSINESSES.map(b => `<option value="${b}">`).join('')}
        </datalist>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Cargo item (G$)</label>
          <input id="f-item" class="form-control" type="number" min="0" value="${d.itemCharge || ''}" placeholder="0">
        </div>
        <div class="form-group">
          <label class="form-label">Cargo entrega (G$)</label>
          <input id="f-delivery" class="form-control" type="number" min="0" value="${d.deliveryCharge || ''}" placeholder="700">
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Estado</label>
        <select id="f-status" class="form-control">
          ${STATUSES.map(s => `<option value="${s.key}" ${(d.status || 'PENDING') === s.key ? 'selected' : ''}>${s.label}</option>`).join('')}
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Notas</label>
        <input id="f-notes" class="form-control" type="text" value="${d.notes || ''}" placeholder="Instrucciones especiales, aclaraciones...">
      </div>

      <div class="flex gap-8 mt-16">
        <button class="btn f1" id="form-cancel">Cancelar</button>

}

function renderSummary(sum) {
  const bizEntries = Object.entries(sum.byBusiness).sort((a, b) => (b[1].items + b[1].delivery) - (a[1].items + a[1].delivery));

  const expenseForm = state.showNewExpense ? `
    <div style="background:var(--surface2);border-radius:var(--radius-sm);padding:14px;margin-bottom:12px">
      <div class="form-row" style="margin-bottom:10px">
        <div>
          <label class="form-label">Tipo</label>
          <select id="exp-type" class="form-control">${EXPENSE_TYPES.map(t => `<option>${t}</option>`).join('')}</select>

        <div>
          <label class="form-label">Monto (G$)</label>
          <input id="exp-amount" class="form-control" type="number" min="0" placeholder="0">
        </div>
      </div>
      <div class="flex gap-8">
        <button class="btn f1 btn-sm" id="exp-cancel">Cancelar</button>
        <button class="btn btn-primary f1 btn-sm" id="exp-submit">Agregar</button>

  return `
    <div class="stats stats-2" style="margin-bottom:14px">
      <div class="stat">
        <div class="stat-label">Total cobrado</div>
        <div class="stat-value accent">${fmtMoney(sum.totalCollection)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Gastos totales</div>
        <div class="stat-value red">−${fmtMoney(sum.totalExpenses)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Balance neto</div>
        <div class="stat-value ${sum.balance >= 0 ? 'green' : 'red'}">${fmtMoney(sum.balance)}</div>
      </div>
      <div class="stat">
        <div class="stat-label">Entregados / Total</div>
        <div class="stat-value">${sum.counts.delivered} / ${sum.counts.total}</div>
      </div>
    </div>

    <div class="card">
      <div class="flex ai jb" style="margin-bottom:12px">
        <div class="card-title" style="margin:0">Gastos del día</div>
        <button class="btn btn-sm" id="add-expense-btn">+ Gasto</button>
      </div>
      ${expenseForm}
      ${state.expenses.length === 0
        ? `<div style="color:var(--text3);font-size:13px;text-align:center;padding:12px">Sin gastos registrados</div>`
        : state.expenses.map(e => `
            <div class="disb-row">

    ${bizEntries.length > 0 ? `
      <div class="card">
        <div class="card-title">Desembolso por proveedor</div>

          <div class="disb-row">

            <div>
              <div class="disb-value">${fmtMoney(amt.items + amt.delivery)}</div>
              ${amt.delivery > 0 ? `<div style="font-size:11px;color:var(--text3)">items: ${fmtMoney(amt.items)} + delivery: ${fmtMoney(amt.delivery)}</div>` : ''}

// ═══════════════════════════════════════════════════
//  MAIN RENDER
// ═══════════════════════════════════════════════════

function render() {
  const app = document.getElementById('app');
  app.innerHTML = state.view === 'home' ? renderHome() : renderSheetView();
  attachEvents();
}

function renderHome() {
  const groups = {};
  state.sheets.forEach(s => {
    if (!groups[s.date]) groups[s.date] = [];
    groups[s.date].push(s);
  });
  const dates = Object.keys(groups).sort((a, b) => b.localeCompare(a));

  const nav = renderNav({
    title: 'General Delivery Sheet',
    sub: `${state.sheets.length} hojas guardadas`,
    back: false,
    action: { label: state.showNewSheet ? 'Cancelar' : '+ Nueva Hoja', ghost: state.showNewSheet },
  });

  const formHtml = state.showNewSheet ? renderNewSheetForm() : '';

  const listHtml = dates.length === 0 && !state.showNewSheet
    ? `<div class="empty">
        <div class="empty-icon">📦</div>
        <div class="empty-text">Sin hojas aún.<br>Crea la primera hoja de entrega.</div>
       </div>`
    : dates.map(date => `
        <div class="section-label">${fmtDate(date)}</div>
        ${groups[date].map(s => `
          <div class="card flex ai jb" style="cursor:pointer;padding:14px 18px" data-open-sheet="${s.id}">
            <div>
              <div style="font-size:15px;font-weight:600">${s.driver}</div>
              <div style="font-size:12px;color:var(--text3);margin-top:2px">${s.date}</div>
            </div>
            <div class="flex ai gap-8">
              <span class="tag ${sheetTagClass(s.type)}">${s.type}</span>
              <span style="color:var(--text3);font-size:20px">›</span>
            </div>
          </div>`).join('')}
      `).join('');

  return `${nav}<div class="page">${formHtml}${listHtml}</div>`;
}

function renderSheetView() {
  const sheet = state.sheets.find(s => s.id === state.currentId);
  if (!sheet) { goHome(); return ''; }

  const sum = calcSummary();
  const pct = sum.counts.total > 0 ? Math.round((sum.counts.delivered / sum.counts.total) * 100) : 0;

  const nav = renderNav({
    title: sheet.driver,
    sub: `${fmtDate(sheet.date)} · ${sheet.type}`,
    back: true,
    action: { label: state.showSummary ? 'Lista' : 'Resumen' },
  });

  if (state.showForm) {
    return `${nav}<div class="page">${renderDeliveryForm()}</div>`;
  }

  if (state.showSummary) {
    return `${nav}<div class="page">${renderSummary(sum)}</div>`;
  }

  // Filter & search
  let filtered = state.deliveries;
  if (state.filterStatus === 'pending')     filtered = filtered.filter(d => d.status === 'PENDING');
  if (state.filterStatus === 'delivered')   filtered = filtered.filter(d => d.status === 'DELIVERED');
  if (state.filterStatus === 'cancelled')   filtered = filtered.filter(d => ['CANCELLED', 'NO_ANSWER'].includes(d.status));
  if (state.filterStatus === 'transferred') filtered = filtered.filter(d => TRANSFERRED_KEYS.includes(d.status));
  if (state.searchText) {
    const q = state.searchText.toLowerCase();
    filtered = filtered.filter(d =>
      (d.name || '').toLowerCase().includes(q) ||
      (d.location || '').toLowerCase().includes(q) ||
      (d.businessName || '').toLowerCase().includes(q)
    );
  }

  const filtersHtml = `
    <div class="filters">
      <button class="chip ${state.filterStatus === 'all'         ? 'active' : ''}" data-filter="all">Todos (${sum.counts.total})</button>
      <button class="chip ${state.filterStatus === 'pending'     ? 'active' : ''}" data-filter="pending">Pendientes (${sum.counts.pending})</button>
      <button class="chip ${state.filterStatus === 'delivered'   ? 'active' : ''}" data-filter="delivered">Entregados (${sum.counts.delivered})</button>
      <button class="chip ${state.filterStatus === 'cancelled'   ? 'active' : ''}" data-filter="cancelled">Cancelados (${sum.counts.cancelled})</button>
      <button class="chip ${state.filterStatus === 'transferred' ? 'active' : ''}" data-filter="transferred">Otros (${sum.counts.transferred})</button>
    </div>`;

  const searchHtml = `
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input id="search-input" class="form-control search-input" type="search"
        value="${state.searchText}" placeholder="Buscar por nombre, ubicación, proveedor...">
    </div>`;

  const deliveriesHtml = filtered.length === 0
    ? `<div class="empty"><div class="empty-icon">🔍</div><div class="empty-text">Sin resultados</div></div>`
    : filtered.map(d => {
        const expanded = state.expandedId === d.id;
        const total = (d.itemCharge || 0) + (d.deliveryCharge || 0);
        const confirmDelete = state.confirmDeleteId === d.id;

        return `
          <div class="delivery-item ${expanded ? 'expanded' : ''}" data-toggle-expand="${d.id}">
            <div class="di-row">
              <div style="flex:1;min-width:0">
                <div class="di-name">${d.name || '(Sin nombre)'}</div>
                <div class="di-meta">${[d.location, d.businessName].filter(Boolean).join(' · ')}</div>
                ${d.contact ? `<div class="di-meta">${d.contact}</div>` : ''}
                ${d.notes   ? `<div class="di-notes">${d.notes}</div>` : ''}
              </div>
              <div class="di-right">
                ${statusBadge(d.status)}
                <div class="di-amount">${fmtMoney(total)}</div>
              </div>
            </div>

            ${expanded ? `
              <div class="di-actions" onclick="event.stopPropagation()">
                <div class="di-actions-label">Cambiar estado rápido:</div>
                <div class="status-grid">
                  ${STATUSES.map(s => `
                    <button class="sq-btn" data-set-status="${d.id}" data-status="${s.key}">${s.label}</button>
                  `).join('')}
                </div>
                ${confirmDelete ? `
                  <div class="confirm-box">
                    <div class="confirm-text">¿Eliminar esta entrega?</div>
                    <div class="flex gap-8">
                      <button class="btn btn-sm f1" data-cancel-delete>Cancelar</button>
                      <button class="btn btn-sm btn-danger f1" data-confirm-delete="${d.id}">Sí, eliminar</button>
                    </div>
                  </div>
                ` : `
                  <div class="di-edit-row">
                    <button class="btn btn-sm f1" data-edit="${d.id}">Editar</button>
                    <button class="btn btn-sm btn-danger" data-ask-delete="${d.id}">Eliminar</button>
                  </div>
                `}
              </div>
            ` : ''}
          </div>`;
      }).join('');

  const confirmDeleteSheet = state.confirmDeleteId === 'sheet' ? `
    <div class="confirm-box" style="margin-top:12px">
      <div class="confirm-text">¿Eliminar esta hoja y todas sus entregas? Esta acción no se puede deshacer.</div>
      <div class="flex gap-8">
        <button class="btn btn-sm f1" data-cancel-delete>Cancelar</button>
        <button class="btn btn-sm btn-danger f1" data-confirm-delete-sheet="${sheet.id}">Sí, eliminar hoja</button>
      </div>
    </div>` : '';

  return `${nav}
    <div class="page">
      <div class="progress"><div class="progress-fill" style="width:${pct}%"></div></div>

      <div class="stats">
        <div class="stat">
          <div class="stat-label">Entregados</div>
          <div class="stat-value green">${sum.counts.delivered}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Cobrado</div>
          <div class="stat-value">${fmtMoney(sum.totalCollection)}</div>
        </div>
        <div class="stat">
          <div class="stat-label">Pendientes</div>
          <div class="stat-value accent">${sum.counts.pending}</div>
        </div>
      </div>

      ${filtersHtml}
      ${searchHtml}
      ${deliveriesHtml}

      <div class="mt-16">
        <button class="btn btn-primary btn-full" id="add-delivery-btn">+ Agregar entrega</button>
      </div>
      <div class="mt-12">
        <button class="btn btn-full" style="color:var(--text3)" id="delete-sheet-btn">Eliminar hoja</button>
      </div>
      ${confirmDeleteSheet}
    </div>`;
}


// ═══════════════════════════════════════════════════
//  EVENT BINDING
// ═══════════════════════════════════════════════════

function attachEvents() {
  const $ = id => document.getElementById(id);
  const app = document.getElementById('app');

  // ── Global delegated click handler ──
  app.addEventListener('click', e => {
    const t = e.target;
    const btn = t.closest('[data-open-sheet],[data-toggle-expand],[data-set-status],[data-edit],[data-ask-delete],[data-confirm-delete],[data-cancel-delete],[data-del-exp],[data-confirm-delete-sheet],[data-filter]');
    if (!btn) return;

    if (btn.dataset.openSheet) {
      openSheet(btn.dataset.openSheet); return;
    }
    if (btn.dataset.toggleExpand) {
      state.expandedId = state.expandedId === btn.dataset.toggleExpand ? null : btn.dataset.toggleExpand;
      state.confirmDeleteId = null;
      render(); return;
    }
    if (btn.dataset.setStatus) {
      setStatus(btn.dataset.setStatus, btn.dataset.status); return;
    }
    if (btn.dataset.edit) {
      state.editingId = btn.dataset.edit;
      state.showForm  = true;
      render(); return;
    }
    if (btn.dataset.askDelete) {
      state.confirmDeleteId = btn.dataset.askDelete;
      render(); return;
    }
    if (btn.dataset.confirmDelete) {
      removeDelivery(btn.dataset.confirmDelete); return;
    }
    if (btn.dataset.confirmDeleteSheet) {
      deleteSheet(btn.dataset.confirmDeleteSheet); return;
    }
    if (btn.dataset.cancelDelete) {
      state.confirmDeleteId = null;
      render(); return;
    }
    if (btn.dataset.delExp) {
      removeExpense(btn.dataset.delExp); return;
    }
    if (btn.dataset.filter) {
      state.filterStatus = btn.dataset.filter;
      render(); return;
    }
  });

  // ── Nav back ──
  const backBtn = $('btn-back');
  if (backBtn) backBtn.addEventListener('click', () => {
    if (state.view === 'sheet') goHome();
  });

  // ── Nav action ──
  const navAction = $('nav-action-btn');
  if (navAction) navAction.addEventListener('click', () => {
    if (state.view === 'home') { state.showNewSheet = !state.showNewSheet; render(); }
    if (state.view === 'sheet') { state.showSummary = !state.showSummary; state.showForm = false; render(); }
  });

  // ── New sheet form ──
  const nsCancel = $('ns-cancel');
  const nsSubmit = $('ns-submit');
  if (nsCancel) nsCancel.addEventListener('click', () => { state.showNewSheet = false; render(); });
  if (nsSubmit) nsSubmit.addEventListener('click', () => {
    const date   = $('ns-date').value;
    const driver = $('ns-driver').value;
    const type   = $('ns-type').value;
    if (!date) return;
    createSheet({ date, driver, type });
  });

  // ── Delivery form ──
  const formCancel = $('form-cancel');
  const formSubmit = $('form-submit');
  if (formCancel) formCancel.addEventListener('click', () => { state.showForm = false; state.editingId = null; render(); });
  if (formSubmit) formSubmit.addEventListener('click', () => {
    const name = ($('f-name').value || '').toUpperCase().trim();
    if (!name) { alert('El nombre del cliente es requerido.'); return; }
    saveDelivery({
      id:             state.editingId || undefined,
      name,
      location:       $('f-location').value.trim(),
      contact:        $('f-contact').value.trim(),
      businessName:   $('f-business').value.trim(),
      itemCharge:     parseInt($('f-item').value)    || 0,
      deliveryCharge: parseInt($('f-delivery').value) || 0,
      status:         $('f-status').value,
      notes:          $('f-notes').value.trim(),
    });
  });

  // ── Add delivery btn ──
  const addBtn = $('add-delivery-btn');
  if (addBtn) addBtn.addEventListener('click', () => {
    state.showForm  = true;
    state.editingId = null;
    render();
  });

  // ── Delete sheet btn ──
  const delSheetBtn = $('delete-sheet-btn');
  if (delSheetBtn) delSheetBtn.addEventListener('click', () => {
    state.confirmDeleteId = 'sheet';
    render();
  });

  // ── Expense controls ──
  const addExpBtn = $('add-expense-btn');
  if (addExpBtn) addExpBtn.addEventListener('click', () => { state.showNewExpense = !state.showNewExpense; render(); });

  const expCancel = $('exp-cancel');
  const expSubmit = $('exp-submit');
  if (expCancel) expCancel.addEventListener('click', () => { state.showNewExpense = false; render(); });
  if (expSubmit) expSubmit.addEventListener('click', () => {
    const type   = $('exp-type').value;
    const amount = parseInt($('exp-amount').value) || 0;
    if (!amount) return;
    saveExpense({ type, amount });
  });

  // ── Search ──
  const searchInput = $('search-input');
  if (searchInput) {
    searchInput.addEventListener('input', e => { state.searchText = e.target.value; render(); });
    searchInput.focus();
  }
}

function seedLocalStorage() {
  // Only seed if localStorage is completely empty (first run)
  if (localStorage.getItem('gds_sheets')) return;
  
  console.log('Seeding', SEED_DATA.sheets.length, 'sheets and',
    Object.values(SEED_DATA.deliveries).flat().length, 'deliveries...');
  
  try {
    localStorage.setItem('gds_sheets', JSON.stringify(SEED_DATA.sheets));
    for (const [sheetId, dels] of Object.entries(SEED_DATA.deliveries)) {
      if (dels.length > 0) {
        localStorage.setItem('gds_d_' + sheetId, JSON.stringify(dels));
      }
    }
    console.log('Seed complete!');
  } catch(e) {
    console.warn('Seed failed (storage full?):', e.message);
  }
}
